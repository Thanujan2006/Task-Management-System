<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #taskForm {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .hi {
        text-align: center;
        color: white;
        position: absolute;
        top: 80px;
        font-size: 32px;
    }

    #taskForm div {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    input,
    select {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        transition: 0.3s;
    }

        input:focus,
        select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
        }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #667eea;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }



</style>
<body>
    <h1 class="hi">Edit Task</h1>

  
    <form id="taskForm">
        <div>
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div>
            <label for="user">Assign To</label>
            <select id="user" name="user" required>
                <option value="">Loading users...</option>
            </select>
        </div>
        <div>
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="Todo">Todo</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>
        <button type="submit">Update Task</button>
    </form>


</body>
</html>
