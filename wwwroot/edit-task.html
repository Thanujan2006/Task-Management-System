<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>

</head>
<style>
    * {
        *

    {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(315deg, #6DDCED, #3EAFE2);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* Navigation bar */
    nav {
        background-color: #2c3e50;
        width: 100%;
        padding: 0.75rem 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

        nav ul {
            list-style: none;
            display: flex;
           
        }

            nav ul li {
                margin: 0 1rem;
            }

                nav ul li a {
                    text-decoration: none;
                    color: #ecf0f1;
                    font-weight: 500;
                    font-size: 1rem;
                    transition: color 0.3s ease, border-bottom 0.3s ease;
                    padding: 0.25rem 0;
                    border-bottom: 2px solid transparent;
                }

                    nav ul li a:hover {
                        color: #3399cc;
                        border-bottom: 2px solid #1abc9c;
                    }

                    nav ul li a:active {
                        color: #3399cc;
                        border-bottom: 2px solid #f39c12;
                    }

    /* Heading */
    .hi {
        text-align: center;
        color: white;
        margin: 40px 0 20px 0;
        font-size: 32px;
        font-weight: bold;
    }

    /* Task form */
    #taskForm {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

        #taskForm div {
            margin-bottom: 20px;
        }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    input,
    select {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        transition: 0.3s;
    }

        input:focus,
        select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
        }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #6DDCED;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

        button:hover {
            background: #3EAFE2;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }



</style>
<body>
    <nav>
        <ul>
            <li> <a href="dashboard.html" target="_blank">DashBoard</a></li>
            <li><a href="add-task.html" target="_blank">AddTask</a></li>
            <li> <a href="tasks.html">Task</a></li>
            <li><a href="user-detail.html">UserDeatail</a></li>
            <li>  <a href="users.html">Users</a></li>
        </ul>


    </nav>


    <h1 class="hi">Edit Task</h1>



    <form id="taskForm">


        <div>
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div>
            <label for="user">Assign To</label>
            <select id="user" name="user" required>
                <option value="">Loading users...</option>
            </select>
        </div>
        <div>
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="Todo">Todo</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>
        <button type="submit">Update Task</button>
    </form>


</body>
</html>
