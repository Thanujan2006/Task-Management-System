<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DASHBOARD</title>
</head>
<body>
    <h1>Task Dashboard</h1>
    <div class="dashboard">
        <div class="card total">
            <div>Total Tasks</div>
            <div class="count" id="totalCount">0</div>
        </div>
        <div class="card todo">
            <div>Todo</div>
            <div class="count" id="todoCount">0</div>
        </div>
        <div class="card in-progress">
            <div>In Progress</div>
            <div class="count" id="inProgressCount">0</div>
        </div>
        <div class="card done">
            <div>Done</div>
            <div class="count" id="doneCount">0</div>
        </div>
    </div>

</body>
</html>
