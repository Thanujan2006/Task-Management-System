<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DASHBOARD</title>
   
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(300deg, #6DDCED, #3EAFE2);
        margin: 0;
        padding: 0;
    }

    .dashboard {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 180px;
        height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
    }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }


        .card div:first-child {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }


    .count {
        font-size: 28px;
        font-weight: bold;
    }

    .total {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
    }

    .todo {
        background: linear-gradient(135deg, #ff9a9e, #fecfef);
        color: #333;
    }

    .in-progress {
        background: linear-gradient(135deg, #f6d365, #fda085);
        color: #333;
    }

    .done {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #333;
    }
    nav {
        background-color: #2c3e50; /* Dark navy background */
        padding: 0.5rem 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex; /* Horizontal layout */
            justify-content: flex-start;
            align-items: center;
        }

            nav ul li {
                margin: 0 1rem;
            }

                nav ul li a {
                    text-decoration: none;
                    color: #ecf0f1; /* Light text */
                    font-weight: 500;
                    font-size: 1rem;
                    transition: color 0.3s ease, border-bottom 0.3s ease;
                    padding: 0.25rem 0;
                    border-bottom: 2px solid transparent;
                }

                    nav ul li a:hover {
                        color: #3399cc; /* Teal hover color */
                        border-bottom: 2px solid #1abc9c;
                    }

                    nav ul li a:active {
                        color: #3399cc; /* Orange active click */
                        border-bottom: 2px solid #f39c12;
                    }




</style>
<body>
    <nav>
        <ul>
            <li> <a href="add-task.html" target="_blank">AddTask</a></li>
            <li><a href="edit-task.html" target="_blank">EditTask</a></li>
            <li> <a href="tasks.html">Task</a></li>
            <li><a href="user-detail.html">UserDeatail</a></li>
            <li>  <a href="users.html">Users</a></li>
        </ul>
    </nav>
        <center><h1>Task Dashboard</h1></center>
        <div class="dashboard">
            <div class="card total">
                <div>Total Tasks</div>
                <div class="count" id="totalCount">0</div>
            </div>
            <div class="card todo">
                <div>Todo</div>
                <div class="count" id="todoCount">0</div>
            </div>
            <div class="card in-progress">
                <div>In Progress</div>
                <div class="count" id="inProgressCount">0</div>
            </div>
            <div class="card done">
                <div>Done</div>
                <div class="count" id="doneCount">0</div>
            </div>
        </div>
    <script>const API_URL = "https://localhost:7298/api/tasks"; 

        document.addEventListener("DOMContentLoaded", loadDashboard);

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error("Failed to fetch tasks");
                }

                const result = await response.json();

 
                const tasks = result.data || result.Data || [];

                updateDashboard(tasks);

            } catch (error) {
                console.error(error);
                alert("Unable to load dashboard");
            }
        }

        function updateDashboard(tasks) {

            document.getElementById("totalCount").textContent = tasks.length;

            const todo = tasks.filter(t => t.status === "Todo").length;

            const inProgress = tasks.filter(t => t.status === "In Progress").length;

            const done = tasks.filter(t => t.status === "Done").length;

            document.getElementById("todoCount").textContent = todo;
            document.getElementById("inProgressCount").textContent = inProgress;
            document.getElementById("doneCount").textContent = done;
        }</script>

</body>
</html>
