<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DASHBOARD</title>
   
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    .dashboard {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
        flex-wrap: wrap;
    }

    .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 180px;
        height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
    }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }


        .card div:first-child {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }


    .count {
        font-size: 28px;
        font-weight: bold;
    }

    .total {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
    }

    .todo {
        background: linear-gradient(135deg, #ff9a9e, #fecfef);
        color: #333;
    }

    .in-progress {
        background: linear-gradient(135deg, #f6d365, #fda085);
        color: #333;
    }

    .done {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #333;
    }

</style>
<body>
    <center><h1>Task Dashboard</h1></center>
    <div class="dashboard">
        <div class="card total">
            <div>Total Tasks</div>
            <div class="count" id="totalCount">0</div>
        </div>
        <div class="card todo">
            <div>Todo</div>
            <div class="count" id="todoCount">0</div>
        </div>
        <div class="card in-progress">
            <div>In Progress</div>
            <div class="count" id="inProgressCount">0</div>
        </div>
        <div class="card done">
            <div>Done</div>
            <div class="count" id="doneCount">0</div>
        </div>
    </div>

</body>
</html>
