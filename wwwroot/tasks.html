<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<style>

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
        color: #333;
    }

    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 2.2rem;
    }

    .search-box {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
    }

        .search-box input {
            width: 50%;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

            .search-box input:focus {
                border-color: #3498db;
                box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
                outline: none;
            }

    #taskTable {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        border-radius: 8px;
        overflow: hidden;
    }

        #taskTable thead {
            background: #3498db;
            color: #fff;
        }

        #taskTable th, #taskTable td {
            padding: 12px 15px;
            text-align: left;
        }

        #taskTable tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s ease;
        }

            #taskTable tbody tr:hover {
                background: #f9f9f9;
            }

    .status {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #fff;
    }

        .status.completed {
            background: #2ecc71;
        }

        .status.pending {
            background: #f39c12;
        }

        .status.in-progress {
            background: #e74c3c;
        }

    /* Action buttons */
    .actions button {
        padding: 6px 12px;
        margin-right: 5px;
        border: none;
        border-radius: 4px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.3s ease;
    }

        .actions button.edit {
            background: #3498db;
            color: #fff;
        }

        .actions button.delete {
            background: #e74c3c;
            color: #fff;
        }

        .actions button:hover {
            opacity: 0.85;
        }
    .button {
        border-radius: 50%;
        margin-left: 10px;
        border: 1px solid transparent;
        Width:50px;
        
    }
        button:hover{
           cursor:pointer;

        }
    nav {
        background-color: #2c3e50; /* Dark navy background */
        padding: 0.5rem 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex; /* Horizontal layout */
            justify-content: flex-start;
            align-items: center;
        }

            nav ul li {
                margin: 0 1rem;
            }

                nav ul li a {
                    text-decoration: none;
                    color: #ecf0f1; /* Light text */
                    font-weight: 500;
                    font-size: 1rem;
                    transition: color 0.3s ease, border-bottom 0.3s ease;
                    padding: 0.25rem 0;
                    border-bottom: 2px solid transparent;
                }

                    nav ul li a:hover {
                        color: #3399cc; /* Teal hover color */
                        border-bottom: 2px solid #1abc9c;
                    }

                    nav ul li a:active {
                        color: #3399cc; /* Orange active click */
                        border-bottom: 2px solid #f39c12;
                    }

</style>
<body>


    <nav>
        <ul>
            <li> <a href="dashboard.html" target="_blank">DashBoard</a></li>
            <li><a href="edit-task.html" target="_blank">EditTask</a></li>
            <li> <a href="add-task.html">AddTask</a></li>
            <li><a href="user-detail.html">UserDeatail</a></li>
            <li>  <a href="users.html">Users</a></li>
        </ul>


    </nav>

    <h1>All Tasks</h1>


    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search tasks by title or user..."><button class="button" onclick=" ">🔍︎</button>
    </div>




    <table id="taskTable">
        <thead>
            <tr>
                <th>Task Title</th>
                <th>User Name</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</body>
</html>
